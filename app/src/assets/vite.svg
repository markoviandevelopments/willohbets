<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="77" height="47" fill="none" aria-labelledby="willoh-logo-title" viewBox="0 0 77 47">
  <title id="willoh-logo-title">Willoh</title>
  <defs>
    <clipPath id="face-clip">
      <circle cx="38.5" cy="23.5" r="20"/>
    </clipPath>
  </defs>
  <!-- Blue from shirt; solid fill for crisp tab contrast on light/dark chrome -->
  <rect width="77" height="47" rx="8" fill="#5a82aa"/>
  <image
    x="17.5"
    y="2.5"
    width="42"
    height="42"
    clip-path="url(#face-clip)"
    preserveAspectRatio="xMidYMid slice"
    xlink:href="data:image/jpeg;base64,"
    href="data:image/jpeg;base64,"
  />
  <!-- Rings for definition at 16px tab sizes -->
  <circle cx="38.5" cy="23.5" r="20" fill="none" stroke="#ffffff" stroke-width="1.75"/>
  <circle cx="38.5" cy="23.5" r="21.25" fill="none" stroke="#243548" stroke-width="0.5" opacity="0.45"/>
</svg>
